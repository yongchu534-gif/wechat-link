<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Add WeChat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  font-family: 'Arial', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.tip {
  font-size: 17px;
  margin-bottom: 25px;
  text-align: center;
  line-height: 1.6;
  color: #eee;
}
.qr-code {
  width: 280px;
  max-width: 90%;
  border-radius: 8px;
  margin-bottom: 30px;
  image-rendering: crisp-edges;
  image-rendering: -webkit-optimize-contrast;
}
.back-btn {
  padding: 12px 24px;
  background: #00C851;
  color: white;
  text-decoration: none;
  border-radius: 4px;
  font-size: 16px;
}
</style>
</head>
<body>
<p class="tip">
Long press or screenshot QR code<br>
Open WeChat scan to add friend<br>
——————————————<br>
截屏保存 → 打开微信 → 扫一扫添加好友
</p>
<img src="https://i.ibb.co/4g8YHyqq/qr.png" class="qr-code" alt="WeChat QR Code">
<a href="index.html" class="back-btn">Back / 返回</a>
</body>
</html>
