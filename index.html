<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            /* 图片没加载完先显示深色底色，杜绝白屏 */
            background-color: #0b0b0b;
            /* 用你现在的 bg.webp */
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), 
                        url('bg.webp');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: . 100vh;
            color: #fff;
            text-align: center;
            padding: 50px 20px;
        }
        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 25px;
            overflow: hidden;
            border: 3px solid #fff;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .brand-name {
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .brand-desc {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .divider {
            width: 60px;
            height: 2.5px;
            background: #fff;
            margin: 0 auto 35px;
        }
        .intro-text {
            font-size: 17px;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .wx-btn {
            background: #07C160;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 22px 35px;
            font-size: 29px;
            width: 100%;
            cursor: pointer;
        }
        .wx-id {
            font-size: 16px;
            margin-top: 8px;
        }
        .qrcode-box {
            display: none;
            margin-top: 30px;
        }
        .qrcode-box img {
            width: 240px;
            height: 240px;
            border-radius: 12px;
            border: 3px solid #fff;
        }
        .qrcode-tip {
            margin-top: 15px;
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="logo">
        <img src="logo.jpg" alt="Logo">
    </div>

    <div class="brand-name">ARTISAN STUDIO</div>
    <div class="brand-desc">8年原版开发 · 高端复刻天花板</div>

    <div class="divider"></div>

    <div class="intro-text">
        奢牌鞋服对标级工艺<br>
        全球可发 | 支持花呗/信用卡<br>
        开箱验货 | 到货7天无理由退换
    </div>

    <button class="wx-btn" id="addWx">
        点击添加店主
        <div class="wx-id">微信: BLCG0592</div>
    </button>

    <div class="qrcode-box" id="qrcodeBox">
        <img src="qrcode.jpg" alt="微信二维码">
        <div class="qrcode-tip">扫码添加微信，或直接搜索微信号</div>
    </div>

<script>
const wechatID = "BLCG0592";
const qrcodeBox = document.getElementById("qrcodeBox");

document.getElementById("addWx").onclick = function(){
    navigator.clipboard.writeText(wechatID).then(()=>{
        alert("✅ 微信号已复制：" + wechatID);
    }).catch(()=>{
        alert("请复制微信号：" + wechatID);
    });
    // 只显示二维码，不跳转微信
    qrcodeBox.style.display = "block";
}
</script>
</body>
</html>
