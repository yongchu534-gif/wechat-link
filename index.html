<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://i.imgur.com/m9LrW5X.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            overflow: hidden;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .brand-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .brand-desc {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: #fff;
            margin: 0 auto 30px;
        }
        .intro-text {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .wx-btn {
            background: #07C160;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 20px 30px;
            font-size: 20px;
            font-weight: 500;
            width: 100%;
            margin-bottom: 30px;
            cursor: pointer;
        }
        .wx-id {
            font-size: 16px;
            opacity: 0.9;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- 你的Logo -->
    <div class="logo">
        <img src="https://i.imgur.com/8Z1qQ9x.png" alt="Artisan Studio Logo">
    </div>

    <!-- 品牌名称 -->
    <div class="brand-name">ARTISAN STUDIO</div>

    <!-- 品牌描述 -->
    <div class="brand-desc">
        8年原版开发 · 高端复刻天花板
    </div>

    <div class="divider"></div>

    <!-- 服务介绍 -->
    <div class="intro-text">
        奢牌鞋服对标级工艺<br>
        全球可发 | 货到付款<br>
        开箱验货 | 7天无理由退换
    </div>

    <!-- 微信按钮 -->
    <button class="wx-btn" id="addWx">
        点击添加店主
        <div class="wx-id">微信/Wechat: BLCG0592</div>
    </button>

    <script>
        const wechatID = "BLCG0592";
        const btn = document.getElementById('addWx');

        btn.addEventListener('click', function() {
            // 复制微信号
            navigator.clipboard.writeText(wechatID).then(() => {
                alert('✅ 微信号已复制成功：' + wechatID + '\n请打开微信粘贴搜索添加店主');
                // 唤起微信
                window.location.href = 'weixin://';
            }).catch(() => {
                alert('⚠️ 复制失败，请手动复制微信号：' + wechatID);
                window.location.href = 'weixin://';
            });
        });
    </script>
</body>
</html>
