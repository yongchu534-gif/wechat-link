<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Artisan Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Arial', sans-serif;
  color: #fff;
  text-align: center;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
.bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -2;
}
.bg img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
}
.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: -1;
}
.content {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  padding: 60px 20px;
}
.logo {
  width: 120px;
  margin: 0 auto 24px;
  display: block;
}
.title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.subtitle {
  font-size: 16px;
  margin-bottom: 24px;
  color: #ccc;
  line-height: 1.6;
}
.desc {
  font-size: 14px;
  line-height: 1.9;
  margin-bottom: 40px;
  color: #ddd;
}
.btn {
  display: block;
  width: 100%;
  padding: 18px;
  background: #00C851;
  color: white;
  text-decoration: none;
  font-size: 18px;
  border-radius: 8px;
  font-weight: bold;
  line-height: 1.4;
  border: none;
  cursor: pointer;
}
.btn-tip {
  font-size: 12px;
  margin-top: 12px;
  color: #aaa;
}
</style>
</head>
<body>
<div class="bg">
  <img src="https://i.ibb.co/Fk97VdRg/bg.jpg" alt="Shop Background">
</div>
<div class="overlay"></div>

<div class="content">
  <img src="https://i.ibb.co/9kMRsgft/logo.png" class="logo" alt="Artisan Studio Logo">
  
  <h1 class="title">ARTISAN STUDIO</h1>

  <p class="subtitle">8 Years Original Development • 八年原版开发<br>Top Tier Replica • 高端复刻天花板</p>

  <div class="desc">
    Luxury Shoes & Apparel • 奢牌鞋服对标顶级工艺<br>
    Worldwide Shipping • 全球可发 | Credit Card Accepted • 支持信用卡<br>
    7-Day Hassle-Free Returns • 7天无理由退换
  </div>

  <button class="btn" onclick="jumpWechat()">WeChat / 微信<br>BLCG0592</button>
  <p class="btn-tip">Tap to open WeChat scan / 点击唤起微信扫一扫</p>
</div>

<script>
function jumpWechat(){
  // 尝试唤起微信自带扫一扫
  let scheme = "weixin://scanqrcode";
  let a = document.createElement('a');
  a.href = scheme;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // 500ms 唤起失败自动跳二维码页面
  setTimeout(function(){
    window.location.href = "qr.html";
  },500);
}
</script>

</body>
</html>
