<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Artisan Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Arial', sans-serif;
  color: #fff;
  text-align: center;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
/* 背景图优化：保证高清不模糊，不拉伸 */
.bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -2;
}
.bg img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
}
/* 半透明遮罩，文字更清晰 */
.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: -1;
}
.content {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  padding: 60px 20px;
}
.logo {
  width: 120px;
  margin: 0 auto 24px;
  display: block;
}
.title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.subtitle {
  font-size: 16px;
  margin-bottom: 24px;
  color: #ccc;
}
.desc {
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 40px;
  color: #ddd;
}
/* 按钮样式，和你原来的绿色保持一致 */
.btn {
  display: block;
  width: 100%;
  padding: 18px;
  background: #00C851;
  color: white;
  text-decoration: none;
  font-size: 18px;
  border-radius: 8px;
  font-weight: bold;
  transition: opacity 0.2s;
}
.btn:hover {
  opacity: 0.9;
}
.btn-tip {
  font-size: 12px;
  margin-top: 12px;
  color: #aaa;
}
</style>
</head>
<body>
<!-- 背景图（优化后不模糊） -->
<div class="bg">
  <img src="https://i.ibb.co/Z1F7t0J/bg-shop.jpg" alt="Shop Background">
</div>
<div class="overlay"></div>

<div class="content">
  <!-- Logo -->
  <img src="https://i.ibb.co/6bZ1W0H/logo-as.png" class="logo" alt="Artisan Studio Logo">
  
  <h1 class="title">ARTISAN STUDIO</h1>
  <p class="subtitle">8 Years Original Development • Top Tier Replica</p>
  
  <div class="desc">
    Luxury Shoes & Apparel<br>
    Worldwide Shipping | Credit Card Accepted<br>
    7-Day Hassle-Free Returns
  </div>

  <!-- 跳转按钮 -->
  <a href="qr.html" class="btn">Add Me On WeChat</a>
  <p class="btn-tip">Tap to view QR code, long press to add</p>
</div>
</body>
</html>
