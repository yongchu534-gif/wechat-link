<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background-color: #0b0b0b;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('bg.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            text-align: center;
            padding: 50px 20px 180px; /* 底部留空给二维码 */
            min-height: 100vh;
        }
        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 25px;
            overflow: hidden;
            border: 3px solid #fff;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .brand-name {
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .brand-desc {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: #fff;
            margin: 0 auto 35px;
        }
        .intro-text {
            font-size: 17px;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .wx-btn {
            background: #07C160;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 22px 35px;
            font-size: 20px;
            width: 100%;
            cursor: pointer;
        }
        .wx-btn-tip {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.9;
        }
        /* 二维码固定在底部 */
        .qrcode-footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            text-align: center;
        }
        .qrcode-footer img {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            border: 2px solid #fff;
        }
        .qrcode-footer-tip {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="logo">
        <img src="logo.jpg" alt="Logo">
    </div>

    <div class="brand-name">ARTISAN STUDIO</div>
    <div class="brand-desc">8年原版开发 · 高端复刻天花板</div>

    <div class="divider"></div>

    <div class="intro-text">
        奢牌鞋服对标级工艺<br>
        快递全球可发 | 支持花呗、信用卡<br>
        支持开箱验货 | 到货7天内不影响二次销售情况下支持无理由退换
    </div>

    <button class="wx-btn" id="addWx">
        点击添加店主微信号
        <div class="wx-btn-tip">截图二维码到微信扫一扫添加好友</div>
    </button>

    <!-- 二维码一直显示在底部 -->
    <div class="qrcode-footer">
        <img src="qrcode.jpg" alt="微信二维码">
        <div class="qrcode-footer-tip">扫码或搜索微信号：BLCG0592</div>
    </div>

<script>
const wechatID = "BLCG0592";
document.getElementById("addWx").onclick = function(){
    // 1. 复制微信号
    navigator.clipboard.writeText(wechatID).then(()=>{
        // 2. 尝试跳微信（移动端有效）
        window.location.href = "weixin://";
        alert("✅ 微信号已复制！正在打开微信…");
    }).catch(()=>{
        alert("❌ 复制失败，请手动复制：" + wechatID);
    });
}
</script>
</body>
</html>
