<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ARTISAN STUDIO</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
        html,body{width:100%;min-height:100vh;background:#111;color:#fff;padding-bottom:calc(120px + env(safe-area-inset-bottom))}
        .hero{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;background:#000}
        .logo{width:90px;border-radius:50%;margin-bottom:20px}
        .title{font-size:30px;font-weight:300;margin-bottom:10px}
        .sub{font-size:14px;opacity:.8;margin-bottom:25px;display:flex;gap:20px}
        .slogan{font-size:19px;margin-bottom:15px}
        .desc{font-size:14px;opacity:.9;max-width:330px;margin:0 auto 20px}
        .qrcode{margin-top:10px}
        .qrcode img{width:140px;border-radius:8px}
        .qrcode-text{font-size:13px;margin-top:8px;opacity:.9}
        .products{padding:50px 20px}
        .products-title{text-align:center;font-size:20px;margin-bottom:25px}
        .footer{padding:20px;text-align:center;font-size:13px;opacity:.7}
        .fixed-bottom{position:fixed;left:0;right:0;bottom:0;background:#000;padding:10px 20px calc(10px + env(safe-area-inset-bottom));z-index:999}
        .btn-group{display:flex;flex-direction:column;gap:8px;max-width:360px;margin:0 auto}
        .btn{padding:13px;border-radius:12px;border:none;font-size:15px;text-align:center;color:#fff}
        .btn-green{background:#07c160}
        .btn-gray{background:#333}
        .tip{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;color:#fff;padding:10px;border-radius:8px;font-size:14px;display:none}
    </style>
</head>
<body>

<div class="hero">
    <img class="logo" src="https://i.postimg.cc/g2hrFd2W/logo.jpg">
    <div class="title">ARTISAN STUDIO</div>
    <div class="sub"><span>同源面料</span><span>原版工艺</span></div>
    <div class="slogan">像素级还原 · 资深玩家的最终归属</div>
    <div class="desc">无惧放大镜视角的严苛推敲<br>多位海内外资深工匠 | 同源皮料/面料</div>
    <div class="qrcode">
        <img src="https://i.postimg.cc/Sx9jFqNT/qrcode.png">
        <div class="qrcode-text">扫码添加微信：BLCG0592</div>
    </div>
</div>

<div class="products">
    <div class="products-title">产品实拍 / 工艺细节</div>
</div>

<div class="footer">微信：BLCG0592 | 全球可发</div>

<div class="fixed-bottom">
    <div class="btn-group">
        <a href="https://rr1.xindinet.cn/wap/1655/" class="btn btn-green">点击进入官方店铺</a>
        <div class="btn btn-gray" onclick="copyWechat()">点击复制微信：BLCG0592</div>
    </div>
</div>

<div class="tip" id="tip">✅ 已复制</div>

<script>
function copyWechat(){
    navigator.clipboard.writeText("BLCG0592");
    let t=document.getElementById("tip");
    t.style.display="block";
    setTimeout(()=>t.style.display="none",1500);
}
</script>

</body>
</html>
