<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Artisan Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:sans-serif;
  color:#fff;
  text-align:center;
  background: url(https://i.ibb.co/Fk97VdRg/bg.jpg) center/cover no-repeat fixed;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}
.content{
  position:relative;
  z-index:1;
  width:100%;
  max-width:400px;
}
.logo{
  width:120px;
  margin:0 auto 20px;
}
.title{
  font-size:28px;
  margin-bottom:10px;
}
.subtitle{
  font-size:16px;
  margin-bottom:20px;
  color:#ccc;
}
.desc{
  font-size:14px;
  line-height:1.6;
  margin-bottom:30px;
  color:#ddd;
}
.btn{
  display:block;
  width:100%;
  padding:16px;
  background:#00C851;
  color:#fff;
  text-decoration:none;
  font-size:18px;
  border-radius:8px;
  font-weight:bold;
}
.btn-tip{
  font-size:12px;
  margin-top:10px;
  color:#aaa;
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="content">
  <img src="https://i.ibb.co/9kMRsgft/logo.png" class="logo">
  <h1 class="title">ARTISAN STUDIO</h1>
  <p class="subtitle">8年原版开发 · 高端复刻天花板</p>
  <div class="desc">
    奢牌鞋服对标顶级工艺<br>
    全球可发 | 支持花呗信用卡<br>
    开箱验货 | 7天无理由退换
  </div>
  <a href="qr.html" class="btn">点击添加店主微信号</a>
  <p class="btn-tip">跳转后长按二维码识别添加</p>
</div>
</body>
</html>
